name: Build IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build unsigned archive
        run: |
          xcodebuild -project OpenCodeRemote.xcodeproj \
            -scheme OpenCodeRemote \
            -configuration Release \
            -archivePath $RUNNER_TEMP/OpenCodeRemote.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Create unsigned IPA
        run: |
          mkdir -p $RUNNER_TEMP/Payload
          cp -r $RUNNER_TEMP/OpenCodeRemote.xcarchive/Products/Applications/OpenCodeRemote.app $RUNNER_TEMP/Payload/
          cd $RUNNER_TEMP
          zip -qry OpenCodeRemote-unsigned.ipa Payload

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: OpenCodeRemote-unsigned-IPA
          path: ${{ runner.temp }}/OpenCodeRemote-unsigned.ipa
