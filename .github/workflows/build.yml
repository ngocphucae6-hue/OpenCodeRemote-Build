name: Build IPA (Unsigned)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'OpenCodeRemote/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'OpenCodeRemote/**'
  workflow_dispatch:

env:
  PROJECT_PATH: OpenCodeRemote
  SCHEME: OpenCodeRemote
  CONFIGURATION: Release
  BUNDLE_ID: com.opencode.remote.ocr2026
  TEAM_ID: JQiRAaCKdW

jobs:
  build:
    runs-on: macos-14
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.0'

    - name: Install provisioning profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles/
        echo "${{ secrets.PROVISIONING_PROFILE }}" > /tmp/profile.mobileprovision
        base64 -d /tmp/profile.mobileprovision > ~/Library/MobileDevice/Provisioning\ Profiles/JQiRAaCKdW-03062026.mobileprovision
      shell: bash

    - name: Build and Archive (Auto Signing)
      run: |
        set -e

        # Clean
        xcodebuild clean \
          -project "${{ env.PROJECT_PATH }}.xcodeproj" \
          -scheme "${{ env.SCHEME }}" \
          -configuration "${{ env.CONFIGURATION }}"

        # Archive with automatic signing
        xcodebuild archive \
          -project "${{ env.PROJECT_PATH }}.xcodeproj" \
          -scheme "${{ env.SCHEME }}" \
          -configuration "${{ env.CONFIGURATION }}" \
          -archivePath "${{ env.PROJECT_PATH }}/build/${{ env.SCHEME }}.xcarchive" \
          DEVELOPMENT_TEAM="${{ env.TEAM_ID }}" \
          CODE_SIGN_IDENTITY="Apple Development" \
          PRODUCT_BUNDLE_IDENTIFIER="${{ env.BUNDLE_ID }}" \
          CODE_SIGN_STYLE="Auto" \
          PROVISIONING_PROFILE_SPECIFIER="JQiRAaCKdW-03062026" \
          ONLY_ACTIVE_ARCH=NO

        if [ ! -d "${{ env.PROJECT_PATH }}/build/${{ env.SCHEME }}.xcarchive" ]; then
          echo "❌ Archive failed"
          exit 1
        fi

        echo "✅ Archive created"

    - name: Export IPA (Development)
      run: |
        # ExportOptions for development (signed)
        cat > ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>auto</string>
            <key>teamID</key>
            <string>${{ env.TEAM_ID }}</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>destination</key>
            <string>export</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>${{ env.BUNDLE_ID }}</key>
                <string>JQiRAaCKdW-03062026</string>
            </dict>
            <key>manifest</key>
            <dict>
                <key>appURL</key>
                <string>https://example.com/OpenCodeRemote.ipa</string>
                <key>bundleIdentifier</key>
                <string>${{ env.BUNDLE_ID }}</string>
                <key>bundleVersion</key>
                <string>1.0</string>
            </dict>
        </dict>
        </plist>
        EOF

        # Export IPA
        xcodebuild -exportArchive \
          -archivePath "${{ env.PROJECT_PATH }}/build/${{ env.SCHEME }}.xcarchive" \
          -exportPath "${{ env.PROJECT_PATH }}/build" \
          -exportOptionsPlist ExportOptions.plist \
          -allowProvisioningUpdates

        # Verify and rename
        if [ -f "${{ env.PROJECT_PATH }}/build/${{ env.SCHEME }}.ipa" ]; then
          cp "${{ env.PROJECT_PATH }}/build/${{ env.SCHEME }}.ipa" "${{ env.PROJECT_PATH }}/build/OpenCodeRemote-Dev.ipa"
          echo "✅ IPA exported: OpenCodeRemote-Dev.ipa"
          ls -lh "${{ env.PROJECT_PATH }}/build/OpenCodeRemote-Dev.ipa"
        else
          echo "❌ IPA not found"
          exit 1
        fi

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: OpenCodeRemote-IPA
        path: |
          OpenCodeRemote/build/OpenCodeRemote-Dev.ipa
          OpenCodeRemote/build/${{ env.SCHEME }}.xcarchive
        retention-days: 30

    - name: Upload dSYM
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dSYMs
        path: |
          OpenCodeRemote/build/${{ env.SCHEME }}.xcarchive/dSYMs/
        retention-days: 30

    - name: Done
      run: |
        echo "🎉 Build complete!"
        echo "📦 Download IPA from Actions artifacts"
        echo "🔐 IPA is signed with development profile (ready to install via eSign or TestFlight)"
